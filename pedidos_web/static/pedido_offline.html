<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d6efd">
    <link rel="manifest" href="/static/manifest.json">
    <title>Pedidos Offline</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f7fb; color: #222; padding: 16px; }
        .card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
        h3 { margin-bottom: 12px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { background: #0d6efd; color: white; border: none; cursor: pointer; }
        .btn-green { background: #198754; }
        .btn-red { background: #dc3545; }
        .btn-gray { background: #6c757d; }
        .result { padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 4px; cursor: pointer; background: white; }
        .result-selected { background: #d4edda; }
        .error { color: #b91c1c; }
        .success { color: #166534; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; font-size: 14px; }
        th { background: #f0f0f0; }
    </style>
</head>
<body>

<div class="card">
    <h3>Estado</h3>
    <p id="status-msg" class="success"></p>
    <p id="error-msg" class="error"></p>
    <p>Clientes: <strong id="clientes-count">0</strong> | Artículos: <strong id="articulos-count">0</strong> | Pendientes: <strong id="pendientes-count">0</strong></p>
    <p>Última sync: <strong id="last-sync">-</strong></p>
    <div style="display:flex; gap:8px; margin-top:12px;">
        <button onclick="cargarDatos()" style="flex:1;">Actualizar datos</button>
        <button onclick="sincronizar()" class="btn-green" style="flex:1;">Sincronizar</button>
    </div>
</div>

<div class="card" id="form-pedido">
    <h3>Nuevo pedido</h3>
    
    <div id="paso1">
        <label>Fecha</label>
        <input type="date" id="fecha">
        
        <label>Cliente</label>
        <input type="text" id="cliente-input" placeholder="Escribí para buscar...">
        <div id="cliente-results"></div>
        
        <button onclick="confirmarCliente()">Confirmar cliente</button>
    </div>
    
    <div id="paso2" style="display:none;">
        <div style="background:#eef4ff; padding:12px; border-radius:8px; margin-bottom:12px;">
            <p><b>Fecha:</b> <span id="ver-fecha"></span></p>
            <p><b>Cliente:</b> <span id="ver-cliente"></span></p>
            <p><b>Vendedor:</b> <span id="ver-vendedor"></span></p>
        </div>
        
        <div id="items-list"></div>
        
        <div id="form-item" style="display:none;">
            <label>Cantidad</label>
            <input type="number" id="cantidad" value="1" min="1">
            
            <label>Artículo</label>
            <input type="text" id="articulo-input" placeholder="Escribí para buscar...">
            <div id="articulo-results"></div>
            
            <div style="display:flex; gap:8px; margin-top:12px;">
                <button onclick="agregarItem()" style="flex:1;">Agregar</button>
                <button onclick="cancelarItem()" class="btn-gray" style="flex:1;">Cancelar</button>
            </div>
        </div>
        
        <button id="btn-nuevo-item" onclick="mostrarFormItem()">Nuevo ítem</button>
        
        <div style="margin-top:16px;">
            <p><b>Total: $<span id="total">0</span></b></p>
            <button onclick="guardarPedido()">Guardar pedido</button>
            <button onclick="cancelarPedido()" class="btn-red" style="margin-top:8px;">Cancelar</button>
        </div>
    </div>
</div>

<script>
var db = null;
var clienteActual = null;
var articuloActual = null;
var items = [];

function abrirDB() {
    return new Promise(function(resolve, reject) {
        var req = indexedDB.open('PedidosDB', 2);
        req.onupgradeneeded = function(e) {
            var d = e.target.result;
            if (!d.objectStoreNames.contains('articulos')) d.createObjectStore('articulos', { keyPath: 'codigo' });
            if (!d.objectStoreNames.contains('clientes')) d.createObjectStore('clientes', { keyPath: 'codigo' });
            if (!d.objectStoreNames.contains('precios')) d.createObjectStore('precios', { keyPath: ['articulo_codigo', 'lista_codigo'] });
            if (!d.objectStoreNames.contains('pedidosPendientes')) d.createObjectStore('pedidosPendientes', { keyPath: 'temp_id', autoIncrement: true });
            if (!d.objectStoreNames.contains('config')) d.createObjectStore('config', { keyPath: 'key' });
        };
        req.onsuccess = function(e) { db = e.target.result; resolve(db); };
        req.onerror = function(e) { reject(e.target.error); };
    });
}

function getAll(store) {
    return new Promise(function(resolve, reject) {
        var tx = db.transaction(store, 'readonly');
        var req = tx.objectStore(store).getAll();
        req.onsuccess = function() { resolve(req.result); };
        req.onerror = function() { reject(req.error); };
    });
}

function clearStore(store) {
    return new Promise(function(resolve, reject) {
        var tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).clear().onsuccess = function() { resolve(); };
        tx.onerror = function() { reject(tx.error); };
    });
}

function putItem(store, item) {
    return new Promise(function(resolve, reject) {
        var tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).put(item).onsuccess = function() { resolve(); };
        tx.onerror = function() { reject(tx.error); };
    });
}

async function guardarDatos(data) {
    var stores = ['articulos', 'clientes', 'precios'];
    for (var s = 0; s < stores.length; s++) {
        var storeName = stores[s];
        if (data[storeName]) {
            var tx = db.transaction(storeName, 'readwrite');
            var store = tx.objectStore(storeName);
            store.clear();
            for (var i = 0; i < data[storeName].length; i++) {
                store.add(data[storeName][i]);
            }
        }
    }
    await putItem('config', { key: 'lastSync', value: new Date().toISOString() });
}

async function init() {
    try {
        await abrirDB();
        var clientes = await getAll('clientes');
        var articulos = await getAll('articulos');
        var pendientes = await getAll('pedidosPendientes');
        var config = await getAll('config');
        
        document.getElementById('clientes-count').textContent = clientes.length;
        document.getElementById('articulos-count').textContent = articulos.length;
        document.getElementById('pendientes-count').textContent = pendientes.length;
        
        var sync = null;
        for (var i = 0; i < config.length; i++) {
            if (config[i].key === 'lastSync') sync = config[i];
        }
        document.getElementById('last-sync').textContent = sync ? new Date(sync.value).toLocaleString() : 'Nunca';
        
        if (clientes.length === 0) {
            document.getElementById('status-msg').textContent = 'Conectate a la WiFi y tocá "Actualizar datos"';
        }
        
        var hoy = new Date();
        var yyyy = hoy.getFullYear();
        var mm = String(hoy.getMonth() + 1).padStart(2, '0');
        var dd = String(hoy.getDate()).padStart(2, '0');
        document.getElementById('fecha').value = yyyy + '-' + mm + '-' + dd;
        
        document.getElementById('error-msg').textContent = '';
        document.getElementById('status-msg').textContent = 'App lista';
    } catch (err) {
        document.getElementById('error-msg').textContent = 'Error: ' + err.message;
    }
}

document.addEventListener('DOMContentLoaded', function() {
    init();
    
    document.getElementById('cliente-input').addEventListener('input', async function() {
        var q = this.value.trim().toLowerCase();
        var div = document.getElementById('cliente-results');
        if (!q) { div.innerHTML = ''; return; }
        try {
            var todos = await getAll('clientes');
            var res = [];
            for (var i = 0; i < todos.length; i++) {
                var c = todos[i];
                if (c.codigo.toLowerCase().indexOf(q) >= 0 || 
                    c.razon_social.toLowerCase().indexOf(q) >= 0 ||
                    (c.nombre_fantasia && c.nombre_fantasia.toLowerCase().indexOf(q) >= 0)) {
                    res.push(c);
                }
                if (res.length >= 5) break;
            }
            if (res.length === 0) {
                div.innerHTML = '<p class="error">No encontrado</p>';
                return;
            }
            var html = '';
            for (var j = 0; j < res.length; j++) {
                html += '<div class="result" onclick="selCliente(\'' + res[j].codigo + '\')"><b>' + res[j].codigo + '</b> - ' + res[j].razon_social + '</div>';
            }
            div.innerHTML = html;
        } catch (err) {
            div.innerHTML = '<p class="error">Error</p>';
        }
    });
    
    document.getElementById('articulo-input').addEventListener('input', async function() {
        var q = this.value.trim().toLowerCase();
        var div = document.getElementById('articulo-results');
        if (!q) { div.innerHTML = ''; return; }
        try {
            var todos = await getAll('articulos');
            var res = [];
            for (var i = 0; i < todos.length; i++) {
                var a = todos[i];
                if (a.codigo.toLowerCase().indexOf(q) >= 0 || 
                    a.descripcion.toLowerCase().indexOf(q) >= 0) {
                    res.push(a);
                }
                if (res.length >= 5) break;
            }
            if (res.length === 0) {
                div.innerHTML = '<p class="error">No encontrado</p>';
                return;
            }
            var html = '';
            for (var j = 0; j < res.length; j++) {
                html += '<div class="result" onclick="selArticulo(\'' + res[j].codigo + '\')"><b>' + res[j].codigo + '</b> - ' + res[j].descripcion + '<br><small>Stock: ' + res[j].stock + '</small></div>';
            }
            div.innerHTML = html;
        } catch (err) {
            div.innerHTML = '<p class="error">Error</p>';
        }
    });
});

async function selCliente(codigo) {
    var todos = await getAll('clientes');
    for (var i = 0; i < todos.length; i++) {
        if (todos[i].codigo === codigo) {
            clienteActual = todos[i];
            document.getElementById('cliente-input').value = codigo + ' - ' + todos[i].razon_social;
            document.getElementById('cliente-results').innerHTML = '<div class="result result-selected"><b>' + codigo + '</b> - ' + todos[i].razon_social + '</div>';
            return;
        }
    }
}

function confirmarCliente() {
    if (!clienteActual) { document.getElementById('error-msg').textContent = 'Seleccioná un cliente'; return; }
    document.getElementById('error-msg').textContent = '';
    document.getElementById('ver-fecha').textContent = document.getElementById('fecha').value;
    document.getElementById('ver-cliente').textContent = clienteActual.codigo + ' - ' + clienteActual.razon_social;
    document.getElementById('ver-vendedor').textContent = clienteActual.codigo_vendedor || '-';
    document.getElementById('paso1').style.display = 'none';
    document.getElementById('paso2').style.display = 'block';
    document.getElementById('btn-nuevo-item').style.display = 'block';
}

function mostrarFormItem() {
    articuloActual = null;
    document.getElementById('articulo-input').value = '';
    document.getElementById('articulo-results').innerHTML = '';
    document.getElementById('form-item').style.display = 'block';
    document.getElementById('btn-nuevo-item').style.display = 'none';
}

function cancelarItem() {
    document.getElementById('form-item').style.display = 'none';
    document.getElementById('btn-nuevo-item').style.display = 'block';
}

async function selArticulo(codigo) {
    var todos = await getAll('articulos');
    for (var i = 0; i < todos.length; i++) {
        if (todos[i].codigo === codigo) {
            articuloActual = todos[i];
            document.getElementById('articulo-input').value = codigo + ' - ' + todos[i].descripcion;
            document.getElementById('articulo-results').innerHTML = '<div class="result result-selected"><b>' + codigo + '</b> - ' + todos[i].descripcion + '<br><small>Stock: ' + todos[i].stock + '</small></div>';
            return;
        }
    }
}

async function getPrecio(clienteCodigo, articuloCodigo) {
    var clientes = await getAll('clientes');
    var c = null;
    for (var i = 0; i < clientes.length; i++) {
        if (clientes[i].codigo === clienteCodigo) { c = clientes[i]; break; }
    }
    if (!c || !c.codigo_lista_precio) return 0;
    var precios = await getAll('precios');
    for (var j = 0; j < precios.length; j++) {
        if (precios[j].articulo_codigo === articuloCodigo && precios[j].lista_codigo === c.codigo_lista_precio) {
            return precios[j].precio;
        }
    }
    return 0;
}

async function agregarItem() {
    if (!articuloActual) { document.getElementById('error-msg').textContent = 'Seleccioná un artículo'; return; }
    var cant = parseInt(document.getElementById('cantidad').value) || 1;
    var precio = await getPrecio(clienteActual.codigo, articuloActual.codigo);
    items.push({
        codigo: articuloActual.codigo,
        descripcion: articuloActual.descripcion,
        cantidad: cant,
        precio: precio,
        subtotal: cant * precio
    });
    renderItems();
    document.getElementById('form-item').style.display = 'none';
    document.getElementById('btn-nuevo-item').style.display = 'block';
    document.getElementById('error-msg').textContent = '';
}

function eliminarItem(i) {
    items.splice(i, 1);
    renderItems();
}

function renderItems() {
    var total = 0;
    var html = '<table><tr><th>Artículo</th><th>Cant</th><th>Precio</th><th>Subtotal</th><th></th></tr>';
    for (var i = 0; i < items.length; i++) {
        total += items[i].subtotal;
        html += '<tr><td>' + items[i].descripcion + '</td><td>' + items[i].cantidad + '</td><td>$' + items[i].precio + '</td><td>$' + items[i].subtotal + '</td><td><button class="btn-red" onclick="eliminarItem(' + i + ')" style="width:auto;padding:4px 8px;">X</button></td></tr>';
    }
    html += '</table>';
    document.getElementById('items-list').innerHTML = html;
    document.getElementById('total').textContent = total;
}

async function guardarPedido() {
    if (!items.length) { document.getElementById('error-msg').textContent = 'Agregá ítems'; return; }
    var pedido = {
        fecha: document.getElementById('fecha').value,
        cliente_codigo: clienteActual.codigo,
        vendedor_codigo: clienteActual.codigo_vendedor || '',
        items: items
    };
    await putItem('pedidosPendientes', pedido);
    items = [];
    renderItems();
    document.getElementById('status-msg').textContent = 'Pedido guardado localmente';
    document.getElementById('error-msg').textContent = '';
    var pendientes = await getAll('pedidosPendientes');
    document.getElementById('pendientes-count').textContent = pendientes.length;
    clienteActual = null;
    document.getElementById('paso1').style.display = 'block';
    document.getElementById('paso2').style.display = 'none';
    document.getElementById('cliente-input').value = '';
    document.getElementById('cliente-results').innerHTML = '';
}

function cancelarPedido() {
    items = [];
    renderItems();
    clienteActual = null;
    document.getElementById('paso1').style.display = 'block';
    document.getElementById('paso2').style.display = 'none';
    document.getElementById('cliente-input').value = '';
    document.getElementById('cliente-results').innerHTML = '';
}

async function cargarDatos() {
    if (!navigator.onLine) { document.getElementById('error-msg').textContent = 'Sin internet'; return; }
    document.getElementById('status-msg').textContent = 'Descargando...';
    try {
        var r = await fetch('/api/data/');
        if (r.ok) {
            var data = await r.json();
            await guardarDatos(data);
            document.getElementById('status-msg').textContent = 'Datos actualizados';
            init();
        }
    } catch (e) {
        document.getElementById('error-msg').textContent = 'Error de conexión';
    }
}

async function sincronizar() {
    if (!navigator.onLine) { document.getElementById('error-msg').textContent = 'Sin internet'; return; }
    var pendientes = await getAll('pedidosPendientes');
    if (!pendientes.length) { document.getElementById('status-msg').textContent = 'No hay pendientes'; return; }
    document.getElementById('status-msg').textContent = 'Sincronizando...';
    try {
        var r = await fetch('/api/sync/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pedidos: pendientes })
        });
        if (r.ok) {
            await clearStore('pedidosPendientes');
            document.getElementById('status-msg').textContent = 'Sincronizado';
            init();
        }
    } catch (e) {
        document.getElementById('error-msg').textContent = 'Error de conexión';
    }
}
</script>
</body>
</html>
