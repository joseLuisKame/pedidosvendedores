{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h3>Articulos</h3>
    <form method="get">
        <input type="text" name="q" value="{{ q }}" placeholder="Buscar por codigo, descripcion o marca...">
        <button type="submit" class="btn btn-primary">Buscar</button>
    </form>
</div>
{% if articulos %}
<div class="card">
    <div class="table-wrapper">
        <table>
            <tr><th>Codigo</th><th>Descripcion</th><th>Rubro</th><th>Marca</th><th>Stock</th></tr>
            {% for articulo in articulos %}
            <tr>
                <td><strong>{{ articulo.codigo }}</strong></td>
                <td>{{ articulo.descripcion }}</td>
                <td>{{ articulo.rubro }}</td>
                <td>{{ articulo.marca }}</td>
                <td>{{ articulo.stock }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endif %}
{% endblock %}
