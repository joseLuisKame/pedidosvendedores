{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Bienvenido</h2>
    <p style="color:var(--gray-500); margin-bottom:20px;">Sistema de pedidos para vendedores</p>
    <div class="stats">
        <div class="stat">
            <div class="number">{{ pedidos_total }}</div>
            <div class="label">Pedidos</div>
        </div>
        <div class="stat">
            <div class="number">{{ clientes_total }}</div>
            <div class="label">Clientes</div>
        </div>
        <div class="stat">
            <div class="number">{{ articulos_total }}</div>
            <div class="label">Articulos</div>
        </div>
    </div>
</div>
<div class="card">
    <h3>Accesos rapidos</h3>
    <a href="/pedido-offline/" class="btn btn-primary" style="text-decoration:none;">Tomar pedido offline</a>
    <a href="/crear-pedido/" class="btn btn-success" style="text-decoration:none;">Crear pedido online</a>
    <a href="/pedidos/" class="btn btn-outline" style="text-decoration:none;">Ver pedidos</a>
</div>
{% endblock %}
