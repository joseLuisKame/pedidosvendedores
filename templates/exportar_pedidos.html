{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h3>Exportar pedidos a CSV</h3>
    <p style="color:var(--gray-500); margin-bottom:16px;">Se generarán archivos por vendedor en la estructura de carpetas pedidos/venXX/pendientes.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary">Exportar</button>
    </form>
</div>
{% endblock %}
