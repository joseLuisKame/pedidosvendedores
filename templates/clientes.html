{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h3>Clientes</h3>
    <form method="get">
        <input type="text" name="q" value="{{ q }}" placeholder="Buscar por codigo o nombre...">
        <button type="submit" class="btn btn-primary">Buscar</button>
    </form>
</div>
{% if clientes %}
<div class="card">
    <div class="table-wrapper">
        <table>
            <tr><th>Codigo</th><th>Razon Social</th><th>Localidad</th><th>Vendedor</th></tr>
            {% for cliente in clientes %}
            <tr>
                <td><strong>{{ cliente.codigo }}</strong></td>
                <td>{{ cliente.razon_social }}</td>
                <td>{{ cliente.localidad }}</td>
                <td>{{ cliente.codigo_vendedor }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endif %}
{% endblock %}
