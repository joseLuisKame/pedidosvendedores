{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h3>Pedidos</h3>
    {% if pedidos %}
    <div class="table-wrapper">
        <table>
            <tr><th>#</th><th>Cliente</th><th>Estado</th><th>Total</th></tr>
            {% for pedido in pedidos %}
            <tr onclick="location.href='/pedidos/{{ pedido.id_pedido }}/'" style="cursor:pointer;">
                <td><strong>{{ pedido.id_pedido }}</strong></td>
                <td>{{ pedido.cliente.razon_social }}</td>
                <td><span class="badge badge-pending">{{ pedido.estado }}</span></td>
                <td><strong>${{ pedido.total }}</strong></td>
            </tr>
            {% endfor %}
        </table>
    </div>
    {% else %}
    <div class="empty-state">
        <p>No hay pedidos cargados</p>
    </div>
    {% endif %}
</div>
{% endblock %}
