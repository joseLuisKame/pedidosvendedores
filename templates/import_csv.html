{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h3>Importar CSV de artículos</h3>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="csv_file" required>
        <button type="submit">Importar</button>
    </form>
</div>
{% endblock %}
