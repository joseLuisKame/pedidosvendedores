{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h3>Importar archivos maestros</h3>
    <p style="color:var(--gray-500); margin-bottom:16px;">Subi un CSV con artículos, clientes, listas de precio o precios.</p>
    {% if message %}
        <div class="msg-success">{{ message }}</div>
    {% endif %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label>Archivo CSV</label>
        <input type="file" name="csv_file" required accept=".csv">
        <button type="submit" class="btn btn-primary">Importar</button>
    </form>
</div>
{% endblock %}
